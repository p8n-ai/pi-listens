name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type (use none for the first 0.1.0 release)"
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ inputs.bump }}" = "none" ]; then
            VERSION=$(node -e "console.log(require('./package.json').version)")
            echo "Releasing current package version: $VERSION"
          else
            OLD_VERSION=$(node -e "console.log(require('./package.json').version)")
            VERSION=$(npm version "${{ inputs.bump }}" --no-git-tag-version)
            VERSION="${VERSION#v}"
            echo "Bumping $OLD_VERSION → $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          if ! grep -q "^## \[$VERSION\]" CHANGELOG.md; then
            sed -i "s/^## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $DATE/" CHANGELOG.md
          fi

          if grep -q "^\[Unreleased\]:" CHANGELOG.md; then
            sed -i "s|^\[Unreleased\]:.*|[Unreleased]: https://github.com/p8n-ai/pi-listens/compare/v$VERSION...HEAD|" CHANGELOG.md
          else
            printf '\n[Unreleased]: https://github.com/p8n-ai/pi-listens/compare/v%s...HEAD\n' "$VERSION" >> CHANGELOG.md
          fi

          if ! grep -q "^\[$VERSION\]:" CHANGELOG.md; then
            printf '[%s]: https://github.com/p8n-ai/pi-listens/releases/tag/v%s\n' "$VERSION" "$VERSION" >> CHANGELOG.md
          fi

      - name: Create release PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/v$VERSION"

          git checkout -b "$BRANCH"
          git add package.json package-lock.json CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "release: v$VERSION"
          fi
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "release: v$VERSION" \
            --body "Automated release PR for v$VERSION. Merging this will trigger npm publish and GitHub release creation.")
          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

          PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]*$')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Merge release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.pr.outputs.number }}" --merge --delete-branch

      - name: Checkout merged main
        run: |
          git checkout main
          git pull origin main

      - name: Tag release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "v$VERSION" >/dev/null 2>&1 || git ls-remote --exit-code --tags origin "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists; reusing it."
          else
            git tag -a "v$VERSION" -m "v$VERSION"
          fi
          git push origin "v$VERSION" || true

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog entry
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]")) found=1
              next
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
